version: "3"
services:
  nginx-proxy:
    image: jwilder/nginx-proxy
    container_name: nginx-proxy
    restart: 'always'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - /root/nginx/certs:/etc/nginx/certs:ro
      - /root/nginx/vhost.d:/etc/nginx/vhost.d:ro
      - /root/nginx/html:/usr/share/nginx/html:ro
networks:
  default:
    external:
      name: nginx-proxy
